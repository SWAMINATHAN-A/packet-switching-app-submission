<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var notFoundFile = '404.html'
        var path = window.location.pathname
        var pathParts = path.split('/').filter(Boolean)
        var base = '/'
        if (path.endsWith('/' + notFoundFile)) {
          base = path.slice(0, -notFoundFile.length)
        } else if (pathParts.length > 0) {
          base = '/' + pathParts[0] + '/'
        }
        var relative = path.startsWith(base) ? path.slice(base.length) : path.replace(/^\//, '')
        var redirect = base
        if (relative !== notFoundFile) {
          redirect = base + relative + window.location.search + window.location.hash
        }
        try {
          window.sessionStorage.setItem('redirect', redirect)
        } catch (e) {
          // ignore storage failures and continue redirect
        }
        window.location.replace(base)
      })()
    </script>
  </head>
  <body></body>
</html>
